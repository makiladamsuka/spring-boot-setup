<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookstore - Manage Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            --error-color: #ef4444;
            --success-color: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 1.2fr 2fr;
            gap: 2rem;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        header {
            grid-column: 1 / -1;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #e0e7ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
        }

        .card h2 {
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
            color: #e0e7ff;
            font-weight: 600;
        }

        /* Form styling */
        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }

        input {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        button {
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0.85rem;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 0.5rem;
        }

        button:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        /* Book List styling */
        .book-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .book-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.25rem;
            transition: all 0.2s ease;
        }

        .book-item:hover {
            border-color: rgba(99, 102, 241, 0.4);
            background-color: rgba(255, 255, 255, 0.04);
            transform: translateY(-2px);
        }

        .book-info h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .book-info p {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .book-meta {
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.5rem;
        }

        .price {
            font-size: 1.1rem;
            font-weight: 700;
            color: #818cf8;
        }

        .btn-link {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--accent-color);
            text-decoration: none;
            padding: 0.4rem 0.8rem;
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .btn-link:hover {
            background-color: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        .no-books {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
            font-style: italic;
            border: 1px dashed var(--border-color);
            border-radius: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Personal Bookstore</h1>
    </header>

    <!-- Add Book Form -->
    <div class="card">
        <h2>Add New Book</h2>
        <form th:action="@{/books}" method="POST">
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" placeholder="e.g. The Hobbit" required>
            </div>

            <div class="form-group">
                <label for="author">Author</label>
                <input type="text" id="author" name="author" placeholder="e.g. J.R.R. Tolkien" required>
            </div>

            <div class="form-group">
                <label for="price">Price ($)</label>
                <input type="number" id="price" name="price" step="0.01" min="0" placeholder="e.g. 14.99" required>
            </div>

            <button type="submit">Add Book</button>
        </form>
    </div>

    <!-- Book List -->
    <div class="card">
        <h2>Current Collection</h2>
        <div class="book-list" th:if="${not #lists.isEmpty(books)}">
            <div class="book-item" th:each="book : ${books}">
                <div class="book-info">
                    <h3 th:text="${book.title}">Book Title</h3>
                    <p th:text="${'by ' + book.author}">by Author Name</p>
                </div>
                <div class="book-meta">
                    <span class="price" th:text="${'$' + #numbers.formatDecimal(book.price, 1, 2)}">$0.00</span>
                    <a th:href="@{/books/{id}(id=${book.id})}" class="btn-link">Edit / Details</a>
                </div>
            </div>
        </div>
        <div class="no-books" th:if="${#lists.isEmpty(books)}">
            No books in the collection yet. Add your first book!
        </div>
    </div>
</div>

</body>
</html>
